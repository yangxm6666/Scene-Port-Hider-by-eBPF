# Package whose UID is allowed to bind the protected ports.
PKG=com.omarea.vtools

# Space-separated TCP ports to hide from bind-based probes.
PORTS="8788 8765"

# eBPF hides bind()-based probes.
ENABLE_EBPF=1

# Set to 1 if you want to wait for the app process before loading eBPF.
# The UID whitelist means loading before the app starts is normally safe.
WAIT_FOR_PROCESS=0
